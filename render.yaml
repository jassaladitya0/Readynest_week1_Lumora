services:
  - type: web
    name: lumora
    runtime: python
    rootDir: lumora
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MPLCONFIGDIR
        value: /tmp/matplotlib
